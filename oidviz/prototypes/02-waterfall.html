<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIDviz · Waterfall</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f1f5f9; --surface: #fff; --border: #e2e8f0;
  --primary: #3b82f6; --primary-dim: #eff6ff;
  --ok: #16a34a; --ok-dim: #dcfce7;
  --warn: #d97706; --warn-dim: #fef3c7;
  --err: #dc2626; --err-dim: #fee2e2;
  --text: #0f172a; --muted: #64748b;
  --mono: ui-monospace, 'Cascadia Code', Menlo, monospace;
}
body { display: flex; flex-direction: row; height: 100vh; overflow: hidden; color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }

/* ── Sidebar ── */
.sidebar { width: 210px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.sb-brand { padding: 14px 16px 12px; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sb-brand span { color: var(--primary); }
.sb-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.sb-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; }
.sb-device-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; word-break: break-all; }
.sb-meta { display: grid; grid-template-columns: auto 1fr; gap: 3px 8px; }
.sb-meta dt { font-size: 11px; color: var(--muted); padding-top: 1px; white-space: nowrap; }
.sb-meta dd { font-size: 11px; font-family: var(--mono); word-break: break-all; }
.sb-nav a { display: block; padding: 5px 8px; border-radius: 5px; text-decoration: none; font-size: 13px; color: var(--muted); margin-bottom: 2px; transition: background .1s, color .1s; }
.sb-nav a:hover { background: var(--bg); color: var(--text); }
.sb-nav a.active { background: var(--primary-dim); color: var(--primary); font-weight: 500; }
.sb-setting { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 6px; }
.sb-setting label { color: var(--muted); }
.sb-setting-row { display: flex; align-items: center; gap: 4px; }
.sb-setting input[type=number] { width: 50px; padding: 2px 5px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: var(--mono); text-align: right; }

/* ── Main column ── */
.main-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.toolbar label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.toolbar input[type=range] { width: 100px; }
.legend { display: flex; gap: 12px; margin-left: auto; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; }
.filter-row { display: flex; gap: 6px; align-items: center; }
.filter-btn { border: 1px solid var(--border); background: var(--surface); padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 500; transition: all .1s; color: var(--text); }
.filter-btn.active { border-color: var(--warn); background: #fef3c7; color: var(--warn); }
.content { flex: 1; display: flex; overflow: hidden; }
.chart-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
canvas { display: block; }

/* ── Right detail pane ── */
.detail-pane { width: 300px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
.detail-pane.empty { align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
.dp-head { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.dp-num { font-size: 15px; font-weight: 700; }
.dp-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
.dp-section { }
.dp-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
.dp-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; gap: 8px; }
.dp-key { color: var(--muted); flex-shrink: 0; }
.dp-val { font-family: var(--mono); font-size: 11px; font-weight: 500; text-align: right; word-break: break-all; }
.att-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.att-num { width: 14px; font-size: 10px; color: var(--muted); text-align: right; flex-shrink: 0; }
.att-track { flex: 1; height: 10px; background: var(--border); border-radius: 3px; overflow: hidden; }
.att-fill { height: 100%; border-radius: 3px; }
.att-label { font-size: 10px; color: var(--muted); white-space: nowrap; font-family: var(--mono); }
.viol-box { background: var(--warn-dim); border: 1px solid #fcd34d; border-radius: 6px; padding: 10px 12px; }
.viol-name { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--warn); margin-bottom: 4px; }
.viol-desc { font-size: 11px; color: #92400e; line-height: 1.5; }
.oid-list { display: flex; flex-direction: column; gap: 3px; }
.oid-item { font-family: var(--mono); font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; gap: 6px; }
.oid-item .vt { background: var(--border); border-radius: 3px; padding: 0 4px; color: var(--muted); font-size: 9px; flex-shrink: 0; }
.chip { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; }
.chip-ok  { background: var(--ok-dim);   color: var(--ok); }
.chip-warn{ background: var(--warn-dim); color: var(--warn); }
.chip-err { background: var(--err-dim);  color: var(--err); }

#tooltip { position: fixed; background: #1e293b; color: #f1f5f9; font-size: 11px; font-family: var(--mono); padding: 8px 10px; border-radius: 6px; pointer-events: none; display: none; z-index: 100; line-height: 1.6; white-space: pre; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-brand">OID<span>viz</span></div>

  <div class="sb-section">
    <div class="sb-label">Device</div>
    <div class="sb-device-name">router-core-1<span style="font-weight:400;color:var(--muted)">.example.net</span></div>
    <dl class="sb-meta">
      <dt>Uptime</dt>   <dd>247d 13h 2m</dd>
      <dt>Location</dt> <dd>DC-2 Rack 14B</dd>
      <dt>Contact</dt>  <dd>noc@example.net</dd>
      <dt>Vendor</dt>   <dd>Cisco</dd>
    </dl>
  </div>

  <div class="sb-section">
    <div class="sb-label">Views</div>
    <nav class="sb-nav">
      <a href="02-waterfall.html" class="active">Waterfall</a>
      <a href="03-subtree.html">Subtree</a>
    </nav>
  </div>

  <div class="sb-section">
    <div class="sb-label">Settings</div>
    <div class="sb-setting">
      <label>Slow &gt;</label>
      <div class="sb-setting-row">
        <input type="number" id="sb-slow-ms" value="2" min="0.1" step="0.5" oninput="Settings.setSlowMs(+this.value)">
        <span style="color:var(--muted)">ms</span>
      </div>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-label">Walk</div>
    <dl class="sb-meta" id="sb-walk"></dl>
  </div>
</aside>

<div class="main-col">
  <div class="toolbar">
    <label>Zoom
      <input type="range" id="zoom" min="1" max="20" value="5" oninput="setZoom(+this.value)">
      <span id="zoom-label">5×</span>
    </label>
    <div class="filter-row">
      <span style="font-size:12px;color:var(--muted)">Filter:</span>
      <button class="filter-btn" id="btn-viol"  onclick="toggleFilter('viol')">Violations</button>
      <button class="filter-btn active" id="btn-slow" onclick="toggleFilter('slow')">Slow</button>
      <button class="filter-btn" id="btn-retry" onclick="toggleFilter('retry')">Retries</button>
    </div>
    <div class="legend">
      <span class="leg"><span class="leg-dot" style="background:#3b82f6"></span>OK</span>
      <span class="leg"><span class="leg-dot" style="background:#f59e0b"></span>Violation</span>
      <span class="leg"><span class="leg-dot" style="background:#ef4444"></span>Timeout</span>
      <span class="leg"><span class="leg-dot" style="background:#93c5fd"></span>Retry</span>
    </div>
  </div>
  <div class="content">
    <div class="chart-wrap" id="chart-wrap"><canvas id="canvas"></canvas></div>
    <div class="detail-pane empty" id="detail-pane"><span>Click an exchange</span></div>
  </div>
</div>
<div id="tooltip"></div>

<script>
const WALK = { bulk_size:10, timeout_s:2.0, retries:2, give_up_after:3, start_oid:"1.3.6.1", community:"public" };

const Settings = {
  _key: 'oidviz', _defaults: { slowMs: 2 },
  get() { try { return {...this._defaults,...JSON.parse(localStorage.getItem(this._key)||'{}')}; } catch { return {...this._defaults}; } },
  setSlowMs(v) {
    if (isNaN(v)||v<=0) return;
    const s=this.get(); s.slowMs=v; localStorage.setItem(this._key,JSON.stringify(s));
    slowThresholdMs=v; if (filters.slow) applyFilters();
  }
};

const _s = Settings.get();
document.getElementById('sb-slow-ms').value = _s.slowMs;
document.getElementById('sb-walk').innerHTML = [
  ['Bulk size', WALK.bulk_size], ['Timeout', WALK.timeout_s+'s'],
  ['Retries', WALK.retries], ['Give up', WALK.give_up_after+' misses'],
  ['Start OID', WALK.start_oid], ['Community', WALK.community],
].map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('');

// OID name lookup (abbreviated)
const OID_NAMES = {
  "1.3.6.1.2.1.1":"system","1.3.6.1.2.1.2":"interfaces",
  "1.3.6.1.2.1.2.2.1":"ifTable","1.3.6.1.2.1.4":"ip",
  "1.3.6.1.2.1.4.21":"ipRouteTable","1.3.6.1.2.1.6":"tcp",
  "1.3.6.1.2.1.11":"snmp","1.3.6.1.2.1.25":"host",
  "1.3.6.1.4.1.9":"cisco","1.3.6.1.4.1.9.9":"ciscoMgmt",
};
function oidLabel(oid) {
  for (const [p,n] of Object.entries(OID_NAMES)) if (oid===p||oid.startsWith(p+'.')) return n;
  return null;
}
const VTYPES = ['Gauge32','Counter32','Integer32','OctetString','IpAddress','TimeTicks'];
function mockVarbinds(oid, n) {
  const parts = oid.split('.');
  const lastNum = parseInt(parts[parts.length-1])||1;
  const prefix = parts.slice(0,-1).join('.');
  return Array.from({length:n},(_,i)=>({ oid: prefix+'.'+(lastNum+i), vtype: VTYPES[(lastNum+i)%VTYPES.length] }));
}

// --- Data ---
const OID_PREFIXES = ["1.3.6.1.2.1.1","1.3.6.1.2.1.2.2.1","1.3.6.1.2.1.4","1.3.6.1.2.1.6","1.3.6.1.2.1.11","1.3.6.1.4.1.9"];
function genOid(seq) { return OID_PREFIXES[Math.floor(seq/40)%OID_PREFIXES.length]+'.'+((seq%200)+1); }
function genExchanges(n) {
  const exch=[]; let t=0;
  for (let i=0;i<n;i++) {
    const spike=Math.random()<0.04, timeout=Math.random()<0.008;
    const baseRtt=spike?2.5+Math.random()*6:0.15+Math.random()*0.55;
    const violation=!timeout&&Math.random()<0.018?['request-id-mismatch','oid-not-increasing'][Math.floor(Math.random()*2)]:null;
    const attempts=[];
    if (timeout) {
      attempts.push({sentAt:t,rtt:2.0,error:'timeout'});
      if (Math.random()<0.6) { const t2=t+2.3; attempts.push({sentAt:t2,rtt:0.2+Math.random()*0.4,error:null}); }
    } else { attempts.push({sentAt:t,rtt:baseRtt,error:null}); }
    const last=attempts[attempts.length-1];
    const receivedAt=last.sentAt+last.rtt;
    exch.push({seq:i+1,sentAt:t,receivedAt,rtt:baseRtt,violation,timeout,attempts,oid:genOid(i)});
    t=receivedAt+0.6+Math.random()*0.9;
  }
  return exch;
}

const ALL=genExchanges(300);
let visible=ALL.slice(), zoom=5, selected=null;
let slowThresholdMs=_s.slowMs;
let filters={viol:false,slow:true,retry:false};

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('chart-wrap');
const MARGIN_L=64,MARGIN_T=28,ROW_H=9,ROW_GAP=3,BAR_H=6;
function msPerPx() { return 1.5/zoom; }

function draw() {
  const W=wrap.clientWidth, rows=visible.length;
  const H=MARGIN_T+rows*(ROW_H+ROW_GAP)+20;
  canvas.width=W; canvas.height=H; ctx.clearRect(0,0,W,H);
  for (let i=0;i<rows;i++) {
    if (i%2===0){ctx.fillStyle='#f8fafc';ctx.fillRect(0,MARGIN_T+i*(ROW_H+ROW_GAP),W,ROW_H+ROW_GAP);}
  }
  const mpp=msPerPx();
  const tickEvery=[0.5,1,2,5,10,20,50].find(t=>t/mpp>60)||100;
  const maxT=visible.length?visible[visible.length-1].receivedAt:300;
  for (let t=0;t<=maxT+tickEvery;t+=tickEvery) {
    const x=MARGIN_L+t/mpp; if (x>W) break;
    ctx.fillStyle='#cbd5e1'; ctx.fillRect(x,MARGIN_T-6,1,H-MARGIN_T+6);
    ctx.fillStyle='#94a3b8'; ctx.font='9px system-ui';
    ctx.fillText(t<1000?t+'ms':(t/1000).toFixed(1)+'s',x+2,12);
  }
  for (let i=0;i<rows;i++) {
    const e=visible[i], y=MARGIN_T+i*(ROW_H+ROW_GAP)+(ROW_H-BAR_H)/2;
    const isSel=selected&&selected.seq===e.seq;
    ctx.fillStyle=isSel?'#3b82f6':'#94a3b8'; ctx.font=isSel?'bold 8px system-ui':'8px system-ui';
    ctx.textAlign='right'; ctx.fillText(e.seq,MARGIN_L-4,y+BAR_H-1); ctx.textAlign='left';
    if (isSel){ctx.fillStyle='#eff6ff';ctx.fillRect(MARGIN_L,MARGIN_T+i*(ROW_H+ROW_GAP),W-MARGIN_L,ROW_H+ROW_GAP);}
    for (const att of e.attempts) {
      const x=MARGIN_L+att.sentAt/mpp, w=Math.max(2,att.rtt/mpp);
      const c=att.error?'#ef4444':e.violation?'#f59e0b':att!==e.attempts[0]?'#93c5fd':'#3b82f6';
      ctx.fillStyle=c; ctx.beginPath(); ctx.roundRect(x,y,w,BAR_H,2); ctx.fill();
      if (w>6){ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(x+1,y+1,w-2,2);}
    }
    if (e.violation){ctx.fillStyle='#f59e0b';ctx.font='bold 8px system-ui';ctx.fillText('!',MARGIN_L+e.receivedAt/mpp+3,y+BAR_H-1);}
  }
}

function rowAt(y) { const i=Math.floor((y-MARGIN_T)/(ROW_H+ROW_GAP)); return (i>=0&&i<visible.length)?visible[i]:null; }

const tooltip=document.getElementById('tooltip');
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const exc=rowAt(e.clientY-rect.top+wrap.scrollTop);
  if (!exc){tooltip.style.display='none';return;}
  tooltip.style.display='block'; tooltip.style.left=(e.clientX+14)+'px'; tooltip.style.top=(e.clientY-10)+'px';
  const totalRtt=exc.attempts.reduce((s,a)=>s+a.rtt,0);
  tooltip.textContent=`#${exc.seq}  ${exc.violation||'ok'}\nRTT: ${totalRtt.toFixed(3)} ms\nOID: ${exc.oid}`;
});
canvas.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const exc=rowAt(e.clientY-rect.top+wrap.scrollTop);
  if (!exc) return;
  selected=exc; draw(); showDetail(exc);
});

const VIOL_DESCS = {
  'request-id-mismatch': 'The response request_id does not match the sent request_id. The device may have returned a stale or out-of-order response.',
  'oid-not-increasing': 'OIDs in the response did not strictly increase. This may indicate an agent bug or an OID loop.',
};

function showDetail(e) {
  const pane=document.getElementById('detail-pane');
  pane.className='detail-pane';
  const totalRtt=e.attempts.reduce((s,a)=>s+a.rtt,0);
  const chip=e.violation?`<span class="chip chip-warn">${e.violation}</span>`
    :e.timeout?`<span class="chip chip-err">timeout</span>`
    :`<span class="chip chip-ok">ok</span>`;

  // Attempt bars — proportional to max RTT in this exchange
  const maxRtt=Math.max(...e.attempts.map(a=>a.rtt));
  const attBars=e.attempts.map((a,i)=>{
    const pct=(a.rtt/maxRtt*100).toFixed(1);
    const c=a.error?'#ef4444':i>0?'#93c5fd':'#3b82f6';
    return `<div class="att-row">
      <span class="att-num">${i+1}</span>
      <div class="att-track"><div class="att-fill" style="width:${pct}%;background:${c}"></div></div>
      <span class="att-label">${a.rtt.toFixed(2)}ms${a.error?' ⚠':''}</span>
    </div>`;
  }).join('');

  // Mock varbinds
  const vbs=mockVarbinds(e.oid, WALK.bulk_size);
  const vbHtml=vbs.map(v=>`<div class="oid-item"><span>${v.oid}</span><span class="vt">${v.vtype}</span></div>`).join('');

  const label=oidLabel(e.oid);
  pane.innerHTML=`
    <div class="dp-head">${chip}<span class="dp-num">Exchange #${e.seq}</span></div>
    <div class="dp-body">
      ${e.violation?`<div class="viol-box"><div class="viol-name">${e.violation}</div><div class="viol-desc">${VIOL_DESCS[e.violation]||''}</div></div>`:''}
      <div class="dp-section">
        <div class="dp-section-title">Timing</div>
        ${attBars}
      </div>
      <div class="dp-section">
        <div class="dp-section-title">Exchange</div>
        <div class="dp-row"><span class="dp-key">Sent at</span><span class="dp-val">${e.sentAt.toFixed(3)} ms</span></div>
        <div class="dp-row"><span class="dp-key">Total RTT</span><span class="dp-val">${totalRtt.toFixed(3)} ms</span></div>
        <div class="dp-row"><span class="dp-key">Attempts</span><span class="dp-val">${e.attempts.length}</span></div>
        <div class="dp-row"><span class="dp-key">PDU</span><span class="dp-val">GetBulk / ${WALK.bulk_size}</span></div>
      </div>
      <div class="dp-section">
        <div class="dp-section-title">Cursor OID${label?' · '+label:''}</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted);word-break:break-all">${e.oid}</div>
      </div>
      <div class="dp-section">
        <div class="dp-section-title">Response varbinds (${vbs.length})</div>
        <div class="oid-list">${vbHtml}</div>
      </div>
    </div>`;
}

function setZoom(z) { zoom=z; document.getElementById('zoom-label').textContent=z+'×'; draw(); }
function toggleFilter(key) {
  filters[key]=!filters[key];
  document.getElementById('btn-'+key).classList.toggle('active',filters[key]);
  applyFilters();
}
function applyFilters() {
  visible=ALL.filter(e=>{
    if (filters.viol&&!e.violation) return false;
    if (filters.slow&&e.rtt<=slowThresholdMs) return false;
    if (filters.retry&&e.attempts.length<=1) return false;
    return true;
  });
  selected=null;
  const p=document.getElementById('detail-pane');
  p.className='detail-pane empty'; p.innerHTML='<span>Click an exchange</span>';
  draw();
}

new ResizeObserver(draw).observe(wrap);
applyFilters();
</script>
</body>
</html>
