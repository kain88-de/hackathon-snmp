<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIDviz · Minimap Overview + Zoomed Detail</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f1f5f9; --surface: #fff; --border: #e2e8f0;
  --primary: #3b82f6; --ok: #16a34a; --warn: #d97706; --err: #dc2626;
  --text: #0f172a; --muted: #64748b;
  --mono: ui-monospace, 'Cascadia Code', Menlo, monospace;
}
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* Drop zone */
#drop-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 40px; }
#drop-zone.hidden { display: none; }
.drop-box { border: 2px dashed var(--border); border-radius: 12px; padding: 48px 64px; text-align: center; background: var(--surface); cursor: pointer; transition: border-color .15s, background .15s; }
.drop-box:hover, .drop-box.drag-over { border-color: var(--primary); background: #eff6ff; }
.drop-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.drop-sub { font-size: 13px; color: var(--muted); }
.drop-sub b { color: var(--text); font-family: var(--mono); font-size: 12px; }
.shortcut-list { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.shortcut-btn { border: 1px solid var(--border); background: var(--surface); padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--mono); transition: all .1s; }
.shortcut-btn:hover { border-color: var(--primary); color: var(--primary); }

/* Viewer */
#viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#viewer.hidden { display: none; }

/* Metrics bar */
#metrics { background: #1e293b; color: #e2e8f0; padding: 10px 16px; display: flex; gap: 24px; flex-shrink: 0; font-size: 12px; font-family: var(--mono); flex-wrap: wrap; }
.metric { display: flex; flex-direction: column; gap: 2px; }
.metric-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-weight: 600; }
.metric-value.ok   { color: #4ade80; }
.metric-value.warn { color: #fbbf24; }
.metric-value.err  { color: #f87171; }

/* Toolbar */
.toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.toolbar label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.filter-btn { border: 1px solid var(--border); background: var(--surface); padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 500; color: var(--text); transition: all .1s; }
.filter-btn.active { border-color: var(--warn); background: #fef3c7; color: var(--warn); }
.btn-reset { border: 1px solid var(--border); background: var(--surface); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--muted); }
.btn-reset:hover { color: var(--err); border-color: var(--err); }
.legend { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Minimap area */
#minimap-wrap {
  flex-shrink: 0;
  background: #0f172a;
  border-bottom: 2px solid var(--border);
  position: relative;
  user-select: none;
}
#minimap-canvas { display: block; cursor: crosshair; }
#mini-tooltip {
  position: absolute;
  background: #1e293b;
  color: #f1f5f9;
  font-size: 11px;
  font-family: var(--mono);
  padding: 4px 8px;
  border-radius: 4px;
  pointer-events: none;
  display: none;
  z-index: 10;
  white-space: pre;
  line-height: 1.5;
}

/* Detail area */
#chart-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
#detail-canvas { display: block; cursor: crosshair; }

/* Tooltip */
#tooltip { position: fixed; background: #1e293b; color: #f1f5f9; font-size: 11px; font-family: var(--mono); padding: 7px 10px; border-radius: 6px; pointer-events: none; display: none; z-index: 100; white-space: pre; line-height: 1.6; }
</style>
</head>
<body>

<!-- Drop zone -->
<div id="drop-zone">
  <div class="drop-box" id="drop-box" onclick="document.getElementById('file-input').click()">
    <div class="drop-title">Drop a trace file or click to open</div>
    <div class="drop-sub" style="margin-bottom:16px">Accepts <b>.oidtrace.jsonl.gz</b></div>
  </div>
  <div style="font-size:12px;color:var(--muted)">Quick load from /tmp/</div>
  <div class="shortcut-list">
    <button class="shortcut-btn" onclick="loadPath('/oidviz/tools/fixtures/trace-5k.oidtrace.jsonl.gz')">trace-5k</button>
    <button class="shortcut-btn" onclick="loadPath('/oidviz/tools/fixtures/trace-50k.oidtrace.jsonl.gz')">trace-50k</button>
    <button class="shortcut-btn" onclick="loadPath('/oidviz/tools/fixtures/trace-100k.oidtrace.jsonl.gz')">trace-100k</button>
    <button class="shortcut-btn" style="border-color:#d97706;color:#d97706" onclick="loadPath('/oidviz/tools/fixtures/trace-focused.oidtrace.jsonl.gz')">focused (3 areas)</button>
  </div>
  <input type="file" id="file-input" accept=".gz" style="display:none" onchange="loadFile(this.files[0])">
</div>

<!-- Viewer -->
<div id="viewer" class="hidden">
  <div id="metrics">
    <div class="metric"><span class="metric-label">Exchanges</span><span class="metric-value" id="m-exchanges">—</span></div>
    <div class="metric"><span class="metric-label">Parse</span><span class="metric-value" id="m-parse">—</span></div>
    <div class="metric"><span class="metric-label">First render</span><span class="metric-value" id="m-render">—</span></div>
    <div class="metric"><span class="metric-label">Visible rows</span><span class="metric-value" id="m-visible">—</span></div>
    <div class="metric"><span class="metric-label">Violations</span><span class="metric-value" id="m-violations">—</span></div>
    <div class="metric"><span class="metric-label">End reason</span><span class="metric-value" id="m-end">—</span></div>
  </div>
  <div class="toolbar">
    <span style="font-size:11px;color:var(--muted)">Window:</span>
    <span style="font-size:11px;color:var(--text);font-family:var(--mono)" id="win-label">—</span>
    <span style="color:var(--border);margin:0 4px">|</span>
    <label style="font-size:12px;color:var(--muted)">
      <input type="checkbox" id="f-slow" checked onchange="applyFilters()"> Slow (&gt;<input type="number" id="slow-ms" value="2" min="1" max="100000" step="1" style="width:52px;font-size:11px;padding:1px 3px;border:1px solid var(--border);border-radius:3px;font-family:var(--mono)" onchange="SLOW_MS=Math.max(1,+this.value||2);applyFilters()">ms)
    </label>
    <label style="font-size:12px;color:var(--muted)">
      <input type="checkbox" id="f-viol" onchange="applyFilters()"> Violations only
    </label>
    <label style="font-size:12px;color:var(--muted)">
      <input type="checkbox" id="f-retry" onchange="applyFilters()"> Retries only
    </label>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>timeout</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>violation</span>
      <span class="legend-item"><span class="legend-dot" style="background:#93c5fd"></span>retry</span>
      <span class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>slow</span>
      <span class="legend-item"><span class="legend-dot" style="background:#94a3b8"></span>ok</span>
    </div>
    <button class="filter-btn" onclick="zoomToProblems()">Zoom to problems</button>
    <button class="filter-btn" onclick="resetWindowWidth()">Reset window</button>
    <button class="btn-reset" onclick="reset()">Load another file</button>
  </div>
  <div id="minimap-wrap">
    <canvas id="minimap-canvas"></canvas>
    <div id="mini-tooltip"></div>
  </div>
  <div id="chart-wrap">
    <canvas id="detail-canvas"></canvas>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ── Constants ──
let SLOW_MS = 2;
const MINI_H = 80;
const MARGIN_L = 64, MARGIN_T = 24, ROW_H = 9, ROW_GAP = 3, BAR_H = 6;
const CANVAS_MAX_H = 32767;
const CANVAS_MAX_PX = 268_435_456;
const WIN_DEFAULT_FRAC = 0.05; // default window width as fraction of total time

// ── State ──
let ALL = [];       // all parsed exchanges
let filtered = [];  // after filter
let summary = null;
let maxT = 1;       // ms, max receivedAtMs after normalization

// Window selection [ms]
let winStartT = 0;
let winEndT = 0;

// Minimap bucket aggregates (over filtered)
let buckets = [];   // [{count, maxRtt, viol, timeout, retry}]
let maxColCount = 1;
let miniWidth = 0;

// ── DOM refs ──
const dropBox       = document.getElementById('drop-box');
const miniCanvas    = document.getElementById('minimap-canvas');
const miniCtx       = miniCanvas.getContext('2d');
const detailCanvas  = document.getElementById('detail-canvas');
const detailCtx     = detailCanvas.getContext('2d');
const wrap          = document.getElementById('chart-wrap');
const miniWrap      = document.getElementById('minimap-wrap');
const miniTip       = document.getElementById('mini-tooltip');
const tooltip       = document.getElementById('tooltip');

// ── Drop zone setup ──
dropBox.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('drag-over'); });
dropBox.addEventListener('dragleave', () => dropBox.classList.remove('drag-over'));
dropBox.addEventListener('drop', e => {
  e.preventDefault(); dropBox.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if (f) loadFile(f);
});

// ── Load entry points ──
async function loadPath(path) {
  try {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
    const blob = await resp.blob();
    await parseAndShow(blob, path.split('/').pop());
  } catch(e) {
    alert('Could not fetch ' + path + '\n' + e.message);
  }
}

async function loadFile(file) {
  await parseAndShow(file, file.name);
}

// ── Parser (verbatim from base) ──
async function parseAndShow(blob, name) {
  const t0 = performance.now();

  let header = null;
  summary = null;
  const exchanges = [];

  const ds = new DecompressionStream('gzip');
  blob.stream().pipeTo(ds.writable).catch(() => {});
  const reader = ds.readable.getReader();
  const decoder = new TextDecoder();
  let buf = '';

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let nl;
      while ((nl = buf.indexOf('\n')) !== -1) {
        const line = buf.slice(0, nl).trim();
        buf = buf.slice(nl + 1);
        if (!line) continue;
        const rec = JSON.parse(line);
        if (rec.type === 'header') {
          header = rec;
        } else if (rec.type === 'summary') {
          summary = rec;
        } else if (rec.type === 'exchange') {
          const first = rec.attempts[0];
          const last  = rec.attempts[rec.attempts.length - 1];
          const totalRttMs = (last.received_at - first.sent_at) * 1000;
          const timeoutS = header?.settings?.timeout_s ?? 2.0;
          exchanges.push({
            seq:          rec.seq,
            sentAtMs:     first.sent_at * 1000,
            receivedAtMs: last.received_at * 1000,
            rtt:          totalRttMs,
            violation:    rec.violation ?? null,
            timeout:      rec.attempts.some(a => (a.received_at - a.sent_at) >= timeoutS - 0.001),
            attempts:     rec.attempts.map(a => ({
              sentAtMs: a.sent_at * 1000,
              rtt:      (a.received_at - a.sent_at) * 1000,
              timeout:  (a.received_at - a.sent_at) >= timeoutS - 0.001,
            })),
            oid: rec.request?.oids?.[0] ?? '',
          });
        }
      }
    }
  } catch(e) {
    console.error('Parse error', e);
  }

  // Normalize: subtract min sentAtMs
  if (exchanges.length) {
    const minT = exchanges[0].sentAtMs;
    for (const e of exchanges) {
      e.sentAtMs     -= minT;
      e.receivedAtMs -= minT;
      for (const a of e.attempts) a.sentAtMs -= minT;
    }
    maxT = Math.max(...exchanges.map(e => e.receivedAtMs));
  }

  const parseMs = performance.now() - t0;
  ALL = exchanges;

  showViewer(parseMs);
}

// ── Show viewer ──
function showViewer(parseMs) {
  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('viewer').classList.remove('hidden');

  const t0 = performance.now();
  applyFilters(true); // true = initial, sets window + draws
  const renderMs = performance.now() - t0;

  document.getElementById('m-exchanges').textContent = ALL.length.toLocaleString();
  document.getElementById('m-parse').textContent = parseMs.toFixed(0) + 'ms';
  document.getElementById('m-parse').className = 'metric-value ' + (parseMs < 500 ? 'ok' : parseMs < 2000 ? 'warn' : 'err');
  document.getElementById('m-render').textContent = renderMs.toFixed(0) + 'ms';
  document.getElementById('m-render').className = 'metric-value ' + (renderMs < 200 ? 'ok' : 'warn');
  document.getElementById('m-violations').textContent = summary
    ? Object.values(summary.violation_counts || {}).reduce((a, b) => a + b, 0)
    : '?';
  document.getElementById('m-end').textContent = summary?.end_reason ?? '?';
}

// ── Color helper ──
function colorFor(rtt, viol, isTimeout, attemptIdx) {
  if (isTimeout)      return '#ef4444';
  if (viol)           return '#f59e0b';
  if (attemptIdx > 0) return '#93c5fd';
  if (rtt > SLOW_MS)  return '#3b82f6';
  return '#94a3b8';
}

// ── Minimap bucket aggregation ──
function buildBuckets() {
  miniWidth = miniCanvas.width;
  if (!miniWidth || !maxT) return;

  buckets = new Array(miniWidth).fill(null).map(() => ({ count: 0, maxRtt: 0, viol: false, timeout: false, retry: false }));
  maxColCount = 1;

  for (const e of filtered) {
    if (e.rtt <= SLOW_MS && !e.timeout && !e.violation && e.attempts.length === 1) continue;
    const col = Math.min(miniWidth - 1, Math.floor(e.sentAtMs / maxT * miniWidth));
    const b = buckets[col];
    b.count++;
    if (e.rtt > b.maxRtt) b.maxRtt = e.rtt;
    if (e.violation) b.viol = true;
    if (e.timeout) b.timeout = true;
    if (e.attempts.length > 1) b.retry = true;
    if (b.count > maxColCount) maxColCount = b.count;
  }
}

// ── Minimap draw ──
function drawMinimap() {
  const W = miniCanvas.width;
  miniCtx.clearRect(0, 0, W, MINI_H);
  miniCtx.fillStyle = '#0f172a';
  miniCtx.fillRect(0, 0, W, MINI_H);

  if (!filtered.length || !W) return;

  for (let col = 0; col < W; col++) {
    const b = buckets[col];
    if (!b || b.count === 0) continue;

    const barH = Math.max(1, Math.round((b.count / maxColCount) * (MINI_H - 4)));
    const y = MINI_H - barH;

    if (b.timeout)      miniCtx.fillStyle = '#ef4444';
    else if (b.viol)    miniCtx.fillStyle = '#f59e0b';
    else if (b.retry)   miniCtx.fillStyle = '#93c5fd';
    else                miniCtx.fillStyle = '#3b82f6';

    miniCtx.fillRect(col, y, 1, barH);
  }

  // Draw selection window overlay
  if (maxT > 0) {
    const wx1 = Math.round(winStartT / maxT * W);
    const wx2 = Math.round(winEndT   / maxT * W);
    const ww  = Math.max(2, wx2 - wx1);

    miniCtx.fillStyle = 'rgba(59, 130, 246, 0.22)';
    miniCtx.fillRect(wx1, 0, ww, MINI_H);
    miniCtx.strokeStyle = '#3b82f6';
    miniCtx.lineWidth = 1;
    miniCtx.strokeRect(wx1 + 0.5, 0.5, ww - 1, MINI_H - 1);
  }
}

// ── Detail draw (bounded to window) ──
function drawDetail() {
  if (!filtered.length) { detailCanvas.width = 1; detailCanvas.height = 1; return; }

  // Filter to window
  const windowExchanges = filtered.filter(
    e => e.sentAtMs < winEndT && e.receivedAtMs > winStartT
  );

  const rows = windowExchanges.length;
  const detailWidth = wrap.clientWidth || 800;
  const winDur = Math.max(1, winEndT - winStartT);

  // Compute height, cap at CANVAS_MAX_H
  const rawH = MARGIN_T + rows * (ROW_H + ROW_GAP) + 20;
  const H = Math.min(rawH, CANVAS_MAX_H);
  const W = Math.min(detailWidth, Math.floor(CANVAS_MAX_PX / Math.max(H, 1)));

  detailCanvas.width  = W;
  detailCanvas.height = H;
  detailCtx.clearRect(0, 0, W, H);

  if (!rows) {
    detailCtx.fillStyle = '#64748b';
    detailCtx.font = '13px system-ui';
    detailCtx.fillText('No exchanges in selected window', MARGIN_L, MARGIN_T + 20);
    updateMetrics(windowExchanges);
    detailCanvas.setAttribute('data-ready', '1');
    return;
  }

  // msPerPx: map winDur to (W - MARGIN_L - 20) pixels
  const drawW = W - MARGIN_L - 20;
  const mpp = winDur / drawW;

  // Alternating row backgrounds
  for (let i = 0; i < rows; i++) {
    const y0 = MARGIN_T + i * (ROW_H + ROW_GAP);
    if (y0 > H) break;
    if (i % 2 === 0) { detailCtx.fillStyle = '#f8fafc'; detailCtx.fillRect(0, y0, W, ROW_H + ROW_GAP); }
  }

  // Time axis ticks
  detailCtx.font = '9px system-ui';
  const tickCandidates = [0.1,0.2,0.5,1,2,5,10,20,50,100,200,500,1000,2000,5000,10000,30000];
  const tickEvery = tickCandidates.find(t => t / mpp > 60) || 60000;
  const tickStart = Math.floor(winStartT / tickEvery) * tickEvery;
  for (let t = tickStart; t <= winEndT + tickEvery; t += tickEvery) {
    const x = MARGIN_L + (t - winStartT) / mpp;
    if (x < MARGIN_L || x > W) continue;
    detailCtx.fillStyle = '#cbd5e1'; detailCtx.fillRect(x, MARGIN_T - 4, 1, H - MARGIN_T + 4);
    detailCtx.fillStyle = '#94a3b8';
    const label = t < 1000 ? t.toFixed(0) + 'ms' : (t / 1000).toFixed(2) + 's';
    detailCtx.fillText(label, x + 2, 11);
  }

  // Draw bars
  for (let i = 0; i < rows; i++) {
    const e = windowExchanges[i];
    const y0 = MARGIN_T + i * (ROW_H + ROW_GAP);
    if (y0 > H) break;
    const y = y0 + (ROW_H - BAR_H) / 2;

    // Seq label
    detailCtx.fillStyle = '#94a3b8'; detailCtx.font = '8px system-ui';
    detailCtx.textAlign = 'right';
    detailCtx.fillText(e.seq, MARGIN_L - 4, y + BAR_H - 1);
    detailCtx.textAlign = 'left';

    for (let ai = 0; ai < e.attempts.length; ai++) {
      const att = e.attempts[ai];
      const x = MARGIN_L + (att.sentAtMs - winStartT) / mpp;
      const w = Math.max(2, att.rtt / mpp);
      detailCtx.fillStyle = colorFor(att.rtt, e.violation, att.timeout, ai);
      detailCtx.beginPath(); detailCtx.roundRect(x, y, w, BAR_H, 2); detailCtx.fill();
      if (w > 6) { detailCtx.fillStyle = 'rgba(255,255,255,0.2)'; detailCtx.fillRect(x + 1, y + 1, w - 2, 2); }
    }

    if (e.violation) {
      const x = MARGIN_L + (e.receivedAtMs - winStartT) / mpp;
      detailCtx.fillStyle = '#f59e0b'; detailCtx.font = 'bold 8px system-ui';
      detailCtx.fillText('!', x + 2, y + BAR_H - 1);
    }
  }

  updateMetrics(windowExchanges);
  detailCanvas.setAttribute('data-ready', '1');
}

function updateMetrics(windowExchanges) {
  document.getElementById('m-visible').textContent = windowExchanges.length.toLocaleString();

  if (maxT > 0) {
    const s1 = (winStartT / 1000).toFixed(2) + 's';
    const s2 = (winEndT   / 1000).toFixed(2) + 's';
    document.getElementById('win-label').textContent = s1 + ' – ' + s2;
  }
}

// ── Zoom to problems (always shrinks; if problems too spread, center on hottest) ──
function zoomToProblems() {
  const problems = filtered.filter(e => e.violation || e.timeout);
  if (!problems.length) { autoFocusWindow(); drawMinimap(); drawDetail(); return; }

  const minPT = Math.min(...problems.map(e => e.sentAtMs));
  const maxPT = Math.max(...problems.map(e => e.receivedAtMs));
  const pad = Math.max((maxPT - minPT) * 0.1, maxT * 0.005);
  const newStart = Math.max(0, minPT - pad);
  const newEnd   = Math.min(maxT, maxPT + pad);
  const curSpan  = winEndT - winStartT;

  if (newEnd - newStart <= curSpan) {
    winStartT = newStart;
    winEndT   = newEnd;
  } else {
    // Problems too spread — center on hottest bucket, keep current width
    let bestCol = 0, bestScore = -1;
    for (let col = 0; col < miniWidth; col++) {
      const b = buckets[col];
      if (!b) continue;
      const score = (b.timeout ? 2e9 : 0) + (b.viol ? 1e9 : 0) + b.maxRtt * 1000 + b.count;
      if (score > bestScore) { bestScore = score; bestCol = col; }
    }
    const centerT = (bestCol + 0.5) / miniWidth * maxT;
    winStartT = Math.max(0, centerT - curSpan / 2);
    winEndT   = Math.min(maxT, winStartT + curSpan);
  }

  drawMinimap();
  drawDetail();
}

// ── Reset window to default width, keep center ──
function resetWindowWidth() {
  const center = (winStartT + winEndT) / 2;
  const half   = maxT * WIN_DEFAULT_FRAC / 2;
  winStartT = Math.max(0, center - half);
  winEndT   = Math.min(maxT, winStartT + maxT * WIN_DEFAULT_FRAC);
  drawMinimap();
  drawDetail();
}

// ── Auto-focus: find hottest bucket ──
function autoFocusWindow() {
  if (!filtered.length || !miniWidth) {
    const span = maxT * WIN_DEFAULT_FRAC;
    winStartT = 0;
    winEndT   = span;
    return;
  }

  let bestCol = 0, bestScore = -1;
  for (let col = 0; col < miniWidth; col++) {
    const b = buckets[col];
    if (!b) continue;
    const score = (b.viol ? 1e9 : 0) + b.maxRtt * 1000 + b.count;
    if (score > bestScore) { bestScore = score; bestCol = col; }
  }

  const centerT = (bestCol + 0.5) / miniWidth * maxT;
  const halfSpan = maxT * WIN_DEFAULT_FRAC / 2;
  winStartT = Math.max(0, centerT - halfSpan);
  winEndT   = Math.min(maxT, centerT + halfSpan);
}

// ── applyFilters (rebuilds everything) ──
function applyFilters(initial = false) {
  const fSlow  = document.getElementById('f-slow').checked;
  const fViol  = document.getElementById('f-viol').checked;
  const fRetry = document.getElementById('f-retry').checked;

  const anyFilter = fSlow || fViol || fRetry;
  filtered = anyFilter
    ? ALL.filter(e =>
        (fSlow  && e.rtt > SLOW_MS) ||
        (fViol  && !!e.violation) ||
        (fRetry && e.attempts.length > 1)
      )
    : ALL.slice();

  // Resize minimap canvas to current wrapper width
  miniCanvas.width  = miniWrap.clientWidth || 800;
  miniCanvas.height = MINI_H;
  miniWidth = miniCanvas.width;

  buildBuckets();

  if (initial) {
    autoFocusWindow();
  }

  drawMinimap();
  drawDetail();
}

// ── Minimap interaction ──
let miniDragging = false;    // 'new' | 'pan' | 'resize-l' | 'resize-r'
let miniDragStartX = 0;
let miniDragStartWin = null; // {startT, endT} snapshot at drag start

function miniTtoX(t) { return t / maxT * miniCanvas.width; }
function miniXtoT(x) { return x / miniCanvas.width * maxT; }

const EDGE_PX = 6;

function miniHitTest(x) {
  const wx1 = miniTtoX(winStartT);
  const wx2 = miniTtoX(winEndT);
  if (x >= wx1 - EDGE_PX && x <= wx1 + EDGE_PX) return 'resize-l';
  if (x >= wx2 - EDGE_PX && x <= wx2 + EDGE_PX) return 'resize-r';
  if (x > wx1 && x < wx2) return 'pan';
  return 'new';
}

miniCanvas.addEventListener('mousedown', e => {
  const rect = miniCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  miniDragging = miniHitTest(x);
  miniDragStartX = x;
  miniDragStartWin = { startT: winStartT, endT: winEndT };
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!miniDragging) return;
  const rect = miniCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const dx = x - miniDragStartX;
  const dt = (dx / miniCanvas.width) * maxT;
  const span = miniDragStartWin.endT - miniDragStartWin.startT;

  if (miniDragging === 'new') {
    const t1 = miniXtoT(Math.min(miniDragStartX, x));
    const t2 = miniXtoT(Math.max(miniDragStartX, x));
    winStartT = Math.max(0, t1);
    winEndT   = Math.min(maxT, Math.max(t2, winStartT + 1));
  } else if (miniDragging === 'pan') {
    const newStart = Math.max(0, Math.min(maxT - span, miniDragStartWin.startT + dt));
    winStartT = newStart;
    winEndT   = newStart + span;
  } else if (miniDragging === 'resize-l') {
    winStartT = Math.max(0, Math.min(miniDragStartWin.endT - 1, miniDragStartWin.startT + dt));
  } else if (miniDragging === 'resize-r') {
    winEndT   = Math.min(maxT, Math.max(miniDragStartWin.startT + 1, miniDragStartWin.endT + dt));
  }

  drawMinimap();
  drawDetail();
});

window.addEventListener('mouseup', e => {
  if (!miniDragging) return;
  const rect = miniCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;

  // If dragged only a tiny amount treat as a click → center window on that point
  if (Math.abs(x - miniDragStartX) < 4 && miniDragging === 'new') {
    const t = miniXtoT(x);
    const half = maxT * WIN_DEFAULT_FRAC / 2;
    winStartT = Math.max(0, t - half);
    winEndT   = Math.min(maxT, t + half);
    drawMinimap();
    drawDetail();
  }

  miniDragging = false;
});

// Minimap hover tooltip
miniCanvas.addEventListener('mousemove', e => {
  if (miniDragging) return;
  const rect = miniCanvas.getBoundingClientRect();
  const x = Math.floor(e.clientX - rect.left);
  if (x < 0 || x >= miniCanvas.width || !buckets[x]) { miniTip.style.display = 'none'; return; }
  const b = buckets[x];
  const t = miniXtoT(x);
  miniTip.style.display = 'block';
  miniTip.style.left  = Math.min(x + 8, miniCanvas.width - 160) + 'px';
  miniTip.style.top   = '4px';
  miniTip.textContent = `t=${t < 1000 ? t.toFixed(0)+'ms' : (t/1000).toFixed(2)+'s'}  count=${b.count}  maxRTT=${b.maxRtt.toFixed(1)}ms${b.viol ? '  VIOL' : ''}`;
});
miniCanvas.addEventListener('mouseleave', () => { miniTip.style.display = 'none'; });

// Minimap cursor style
miniCanvas.addEventListener('mousemove', e => {
  if (miniDragging) return;
  const rect = miniCanvas.getBoundingClientRect();
  const hit = miniHitTest(e.clientX - rect.left);
  if (hit === 'resize-l' || hit === 'resize-r') miniCanvas.style.cursor = 'ew-resize';
  else if (hit === 'pan') miniCanvas.style.cursor = 'grab';
  else miniCanvas.style.cursor = 'crosshair';
}, { passive: true });

// Keyboard nudge
document.addEventListener('keydown', e => {
  if (!filtered.length) return;
  if (e.target.tagName === 'INPUT') return;
  const span = winEndT - winStartT;
  const step = span * 0.2;
  if (e.key === 'ArrowLeft') {
    winStartT = Math.max(0, winStartT - step);
    winEndT   = winStartT + span;
    drawMinimap(); drawDetail();
  } else if (e.key === 'ArrowRight') {
    winEndT   = Math.min(maxT, winEndT + step);
    winStartT = winEndT - span;
    drawMinimap(); drawDetail();
  }
});

// ── Detail canvas tooltip ──
detailCanvas.addEventListener('mousemove', e => {
  const rect = detailCanvas.getBoundingClientRect();
  const relY = e.clientY - rect.top + wrap.scrollTop;
  const i = Math.floor((relY - MARGIN_T) / (ROW_H + ROW_GAP));

  const windowExchanges = filtered.filter(
    ex => ex.sentAtMs < winEndT && ex.receivedAtMs > winStartT
  );
  if (i < 0 || i >= windowExchanges.length) { tooltip.style.display = 'none'; return; }
  const exc = windowExchanges[i];

  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
  const pct = ALL.length ? Math.round(exc.seq / ALL.length * 100) : '?';
  tooltip.textContent =
    `#${exc.seq} (${pct}% into trace)  ${exc.violation || (exc.timeout ? 'timeout' : 'ok')}\n` +
    `RTT: ${exc.rtt.toFixed(1)} ms  sent at ${(exc.sentAtMs/1000).toFixed(3)}s\n` +
    `OID: ${exc.oid}`;
});
detailCanvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

// ── Reset ──
function reset() {
  ALL = []; filtered = []; summary = null; maxT = 1;
  winStartT = 0; winEndT = 0; buckets = [];
  miniCtx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
  detailCtx.clearRect(0, 0, detailCanvas.width, detailCanvas.height);
  document.getElementById('viewer').classList.add('hidden');
  document.getElementById('drop-zone').classList.remove('hidden');
}

// ── Resize ──
new ResizeObserver(() => {
  if (!ALL.length) return;
  miniCanvas.width  = miniWrap.clientWidth || 800;
  miniCanvas.height = MINI_H;
  miniWidth = miniCanvas.width;
  buildBuckets();
  drawMinimap();
  drawDetail();
}).observe(miniWrap);
</script>
</body>
</html>
