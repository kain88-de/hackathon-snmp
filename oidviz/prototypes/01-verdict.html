<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIDviz · Verdict</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f1f5f9; --surface: #fff; --border: #e2e8f0;
  --primary: #3b82f6; --primary-dim: #eff6ff;
  --ok: #16a34a; --ok-dim: #dcfce7;
  --warn: #d97706; --warn-dim: #fef3c7;
  --err: #dc2626; --err-dim: #fee2e2;
  --text: #0f172a; --muted: #64748b;
  --mono: ui-monospace, 'Cascadia Code', Menlo, monospace;
  --radius: 8px;
}
body { display: flex; flex-direction: row; height: 100vh; overflow: hidden; color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; background: var(--bg); }

/* ── Sidebar ── */
.sidebar { width: 210px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.sb-brand { padding: 14px 16px 12px; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sb-brand span { color: var(--primary); }
.sb-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.sb-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; }
.sb-device-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; word-break: break-all; }
.sb-meta { display: grid; grid-template-columns: auto 1fr; gap: 3px 8px; }
.sb-meta dt { font-size: 11px; color: var(--muted); padding-top: 1px; }
.sb-meta dd { font-size: 11px; font-family: var(--mono); word-break: break-all; }
.sb-nav a { display: block; padding: 5px 8px; border-radius: 5px; text-decoration: none; font-size: 13px; color: var(--muted); margin-bottom: 2px; transition: background .1s, color .1s; }
.sb-nav a:hover { background: var(--bg); color: var(--text); }
.sb-nav a.active { background: var(--primary-dim); color: var(--primary); font-weight: 500; }
.sb-setting { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 6px; }
.sb-setting label { color: var(--muted); }
.sb-setting-row { display: flex; align-items: center; gap: 4px; }
.sb-setting input[type=number] { width: 50px; padding: 2px 5px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: var(--mono); text-align: right; }

/* ── Main ── */
.main-area { flex: 1; overflow-y: auto; overflow-x: hidden; }
.main { max-width: 800px; margin: 28px auto; padding: 0 24px; display: flex; flex-direction: column; gap: 18px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 14px; }
.chip { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }
.chip-ok { background: var(--ok-dim); color: var(--ok); }
.chip-warn { background: var(--warn-dim); color: var(--warn); }
.chip-err { background: var(--err-dim); color: var(--err); }
.verdict-row { display: flex; align-items: center; gap: 16px; }
.verdict-label { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.verdict-meta { color: var(--muted); font-size: 13px; margin-top: 2px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
.viol-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.viol-row:last-child { border-bottom: none; }
.viol-name { font-family: var(--mono); font-size: 12px; flex: 1; }
.viol-bar-wrap { width: 140px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.viol-bar { height: 100%; background: var(--warn); border-radius: 3px; transition: width .4s ease; }
.viol-count { font-family: var(--mono); font-size: 12px; width: 36px; text-align: right; font-weight: 600; color: var(--warn); }
.no-violations { text-align: center; padding: 16px; color: var(--ok); font-weight: 500; font-size: 13px; }
.tl-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.tl-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--ok), var(--primary)); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-brand">OID<span>viz</span></div>

  <div class="sb-section">
    <div class="sb-label">Device</div>
    <div class="sb-device-name">router-core-1<span style="font-weight:400;color:var(--muted)">.example.net</span></div>
    <dl class="sb-meta">
      <dt>Uptime</dt>   <dd>247d 13h 2m</dd>
      <dt>Location</dt> <dd>DC-2 Rack 14B</dd>
      <dt>Contact</dt>  <dd>noc@example.net</dd>
      <dt>Vendor</dt>   <dd>Cisco</dd>
    </dl>
  </div>

  <div class="sb-section">
    <div class="sb-label">Views</div>
    <nav class="sb-nav">
      <a href="01-verdict.html" class="active">Verdict</a>
      <a href="02-waterfall.html">Waterfall</a>
      <a href="03-subtree.html">Subtree</a>
      <a href="04-detail.html">Exchange Detail</a>
    </nav>
  </div>

  <div class="sb-section">
    <div class="sb-label">Settings</div>
    <div class="sb-setting">
      <label>Slow &gt;</label>
      <div class="sb-setting-row">
        <input type="number" id="sb-slow-ms" value="2" min="0.1" step="0.5" oninput="Settings.setSlowMs(+this.value)">
        <span style="color:var(--muted)">ms</span>
      </div>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-label">Walk</div>
    <dl class="sb-meta" id="sb-walk"></dl>
  </div>
</aside>

<div class="main-area">
<div class="main">

  <!-- Walk result -->
  <div class="card">
    <div class="card-title">Walk result</div>
    <div class="verdict-row">
      <span class="verdict-label" id="verdict-label">—</span>
      <span class="chip" id="verdict-chip"></span>
    </div>
    <div class="verdict-meta" id="verdict-meta"></div>
    <div class="tl-wrap" style="margin-top:14px;"><div class="tl-fill" id="tl-fill" style="width:0%"></div></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Violations -->
  <div class="card">
    <div class="card-title">Protocol violations</div>
    <div id="violations-container"></div>
  </div>


</div>
</div>

<script>
const TRACE = {
  header: {
    tool: "oidtrace/0.1.0",
    started_at: "2026-06-12T12:39:35Z",
    label: "router-core-1",
    snmp_version: "2c",
    settings: { bulk_size: 10, timeout_s: 2.0, retries: 2, start_oid: "1.3.6.1", give_up_after: 3, community: "public" }
  },
  summary: {
    at: 7.138,
    exchanges: 2976,
    oids_seen: 29750,
    end_reason: "completed",
    violation_counts: { "request-id-mismatch": 3, "oid-not-increasing": 1 }
  }
};

const Settings = {
  _key: 'oidviz',
  _defaults: { slowMs: 2 },
  get() {
    try { return { ...this._defaults, ...JSON.parse(localStorage.getItem(this._key) || '{}') }; }
    catch { return { ...this._defaults }; }
  },
  setSlowMs(v) {
    if (isNaN(v) || v <= 0) return;
    const s = this.get(); s.slowMs = v;
    localStorage.setItem(this._key, JSON.stringify(s));
  }
};
document.getElementById('sb-slow-ms').value = Settings.get().slowMs;

const END_LABELS = { completed:"Completed", unresponsive:"Unresponsive", oid_loop:"OID Loop", time_budget_exceeded:"Time Budget", interrupted:"Interrupted" };
const END_CLASS  = { completed:"chip-ok", unresponsive:"chip-err", oid_loop:"chip-err", time_budget_exceeded:"chip-warn", interrupted:"chip-warn" };

function fmt(n) { return n.toLocaleString(); }
function fmtDur(s) { return s < 60 ? `${s.toFixed(2)}s` : `${Math.floor(s/60)}m ${(s%60).toFixed(1)}s`; }

function render() {
  const { header: h, summary: s } = TRACE;
  const reason = s.end_reason;

  document.getElementById("verdict-label").textContent = END_LABELS[reason] || reason;
  const chip = document.getElementById("verdict-chip");
  chip.textContent = reason.replace(/_/g, " ");
  chip.className = "chip " + (END_CLASS[reason] || "chip-warn");

  document.getElementById("verdict-meta").textContent =
    `${h.label ? h.label + " · " : ""}SNMP ${h.snmp_version} · started ${new Date(h.started_at).toISOString().replace("T"," ").slice(0,19)} UTC`;

  const fills = { completed:"100", unresponsive:"60", oid_loop:"45", time_budget_exceeded:"100", interrupted:"75" };
  setTimeout(() => { document.getElementById("tl-fill").style.width = (fills[reason]||"80")+"%"; }, 100);

  const totalViolations = Object.values(s.violation_counts).reduce((a,b)=>a+b,0);
  const oidRate = s.oids_seen / s.at;
  const statsData = [
    { value: fmt(s.exchanges),  label: "Exchanges", sub: `${(s.at/s.exchanges*1000).toFixed(1)} ms avg` },
    { value: fmt(s.oids_seen),  label: "OIDs seen",  sub: `${oidRate.toFixed(0)} OIDs/s` },
    { value: fmtDur(s.at),      label: "Duration",   sub: h.settings.start_oid },
    { value: totalViolations===0 ? "None" : fmt(totalViolations), label: "Violations",
      sub: totalViolations===0 ? "clean walk" : `${Object.keys(s.violation_counts).length} type(s)`,
      color: totalViolations===0 ? "var(--ok)" : "var(--warn)" }
  ];
  document.getElementById("stats").innerHTML = statsData.map(d =>
    `<div class="stat">
      <div class="stat-value" style="${d.color?`color:${d.color}`:""}">${d.value}</div>
      <div class="stat-label">${d.label}</div>
      <div class="stat-sub">${d.sub}</div>
    </div>`
  ).join("");

  const vc = s.violation_counts;
  const keys = Object.keys(vc);
  const maxCount = keys.length ? Math.max(...Object.values(vc)) : 0;
  const container = document.getElementById("violations-container");
  if (keys.length===0) {
    container.innerHTML = `<div class="no-violations">✓ No protocol violations detected</div>`;
  } else {
    container.innerHTML = keys.map(k => {
      const pct = (vc[k]/maxCount*100).toFixed(1);
      return `<div class="viol-row">
        <span class="viol-name">${k}</span>
        <div class="viol-bar-wrap"><div class="viol-bar" style="width:0%" data-pct="${pct}"></div></div>
        <span class="viol-count">${vc[k]}</span>
      </div>`;
    }).join("");
    setTimeout(() => {
      document.querySelectorAll(".viol-bar").forEach(el => { el.style.width = el.dataset.pct+"%"; });
    }, 120);
  }

  const cfg = h.settings;
  const walkRows = [
    ["Bulk size", cfg.bulk_size], ["Timeout", cfg.timeout_s+"s"],
    ["Retries", cfg.retries], ["Give up after", cfg.give_up_after+" misses"],
    ["Start OID", cfg.start_oid], ["Community", cfg.community],
  ];
  document.getElementById("sb-walk").innerHTML = walkRows.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join("");
}


function animateCount(el, target, isFloat) {
  const dur=600, steps=40, interval=dur/steps; let step=0;
  const timer = setInterval(() => {
    step++;
    el.textContent = isFloat ? (target*step/steps).toFixed(2)+"s" : Math.round(target*step/steps).toLocaleString();
    if (step>=steps) { clearInterval(timer); el.textContent = isFloat ? target.toFixed(2)+"s" : target.toLocaleString(); }
  }, interval);
}

render();
setTimeout(() => {
  const vals = document.querySelectorAll(".stat-value");
  animateCount(vals[0], TRACE.summary.exchanges, false);
  animateCount(vals[1], TRACE.summary.oids_seen, false);
}, 50);
</script>
</body>
</html>
