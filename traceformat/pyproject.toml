[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "traceformat"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = ["pydantic>=2"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov",
    "datamodel-code-generator>=0.25",
    "ruff>=0.9",
    "pyrefly>=1.0",
    "pyright>=1.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/traceformat"]

[tool.ruff]
line-length = 100
# models.py is generated by datamodel-code-generator; excluded so the drift gate works
extend-exclude = ["src/traceformat/models.py"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "SIM", "ARG", "RUF", "ASYNC", "TC", "PTH", "PL"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["PLR2004"]

[tool.pyrefly]
project_includes = ["src", "tests"]
python_interpreter = "../.venv/bin/python3"

[tool.pyright]
venvPath = ".."
venv = ".venv"
typeCheckingMode = "strict"
exclude = ["src/traceformat/models.py"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["traceformat"]

[tool.coverage.report]
fail_under = 100
