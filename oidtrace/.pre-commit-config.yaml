repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format check
        language: system
        entry: uv run ruff format --check src tests
        types: [python]
        pass_filenames: false

      - id: ruff-lint
        name: ruff lint
        language: system
        entry: uv run ruff check src tests
        types: [python]
        pass_filenames: false

      - id: pyrefly
        name: pyrefly type check
        language: system
        entry: uv run pyrefly check
        types: [python]
        pass_filenames: false
