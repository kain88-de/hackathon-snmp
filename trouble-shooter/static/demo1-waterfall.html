<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SNMP Walk — Waterfall</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0f172a; color: #cbd5e1; font-size: 12px; }
    .header { padding: 20px 24px 14px; border-bottom: 1px solid #1e293b; }
    h1 { font-size: 17px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; }
    .stats { display: flex; gap: 28px; }
    .stat { display: flex; flex-direction: column; }
    .stat-value { font-size: 22px; font-weight: 700; color: #f8fafc; line-height: 1; }
    .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
    .legend { padding: 8px 24px; display: flex; gap: 20px; flex-wrap: wrap; border-bottom: 1px solid #1e293b; background: #0c1322; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #94a3b8; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .scale-row { display: flex; padding: 4px 24px; border-bottom: 1px solid #1e293b; background: #0c1322; position: sticky; top: 0; z-index: 10; }
    .col-label { width: 130px; flex-shrink: 0; font-size: 10px; color: #475569; }
    .col-oid { width: 270px; flex-shrink: 0; font-size: 10px; color: #475569; }
    .col-bar { flex: 1; min-width: 300px; font-size: 10px; color: #475569; }
    .scale-ticks { display: flex; justify-content: space-between; }
    .col-ms-h { width: 56px; flex-shrink: 0; }
    .group-header { display: flex; align-items: center; padding: 5px 24px; background: #111827; border-top: 1px solid #1e293b; border-bottom: 1px solid #1e293b; }
    .group-name { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; }
    .group-meta { margin-left: auto; font-size: 10px; color: #475569; display: flex; gap: 14px; }
    .row { display: flex; align-items: center; padding: 0 24px; height: 21px; border-bottom: 1px solid #0a1020; cursor: default; }
    .row:hover { background: #1a2744; }
    .col-badge { width: 130px; flex-shrink: 0; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .col-oid-val { width: 270px; flex-shrink: 0; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .col-bar-cell { flex: 1; min-width: 300px; height: 100%; position: relative; display: flex; align-items: center; }
    .bar-fill { height: 9px; border-radius: 2px; min-width: 2px; }
    .col-ms { width: 56px; flex-shrink: 0; text-align: right; font-weight: 700; }
    .tooltip {
      position: fixed; background: #1e293b; border: 1px solid #334155;
      padding: 9px 12px; border-radius: 6px; font-size: 11px; pointer-events: none;
      max-width: 420px; z-index: 100; display: none; line-height: 1.6;
    }
    .tt-oid { color: #e2e8f0; font-weight: 600; margin-bottom: 3px; word-break: break-all; }
    .tt-val { color: #94a3b8; }
    .tt-ms  { color: #f8fafc; margin-top: 3px; font-weight: 700; }
  </style>
</head>
<body>
<div class="tooltip" id="tooltip">
  <div class="tt-oid" id="tt-oid"></div>
  <div class="tt-val" id="tt-val"></div>
  <div class="tt-ms"  id="tt-ms"></div>
</div>
<div id="app"></div>
<script>
const DATA = [
  // system MIB — fast (1–3 ms)
  { oid: "1.3.6.1.2.1.1.1.0",          value: "Linux 5.15.0 #1 SMP x86_64",      ms: 3  },
  { oid: "1.3.6.1.2.1.1.2.0",          value: "1.3.6.1.4.1.8072.3.2.10",         ms: 2  },
  { oid: "1.3.6.1.2.1.1.3.0",          value: "1234567890",                       ms: 1  },
  { oid: "1.3.6.1.2.1.1.4.0",          value: "admin@example.com",                ms: 2  },
  { oid: "1.3.6.1.2.1.1.5.0",          value: "router-01.example.com",            ms: 1  },
  { oid: "1.3.6.1.2.1.1.6.0",          value: "Server Room A",                   ms: 2  },
  { oid: "1.3.6.1.2.1.1.7.0",          value: "72",                               ms: 3  },
  // interfaces — moderate (7–18 ms)
  { oid: "1.3.6.1.2.1.2.1.0",          value: "8",                                ms: 8  },
  { oid: "1.3.6.1.2.1.2.2.1.1.1",      value: "1",                                ms: 9  },
  { oid: "1.3.6.1.2.1.2.2.1.2.1",      value: "lo",                               ms: 7  },
  { oid: "1.3.6.1.2.1.2.2.1.3.1",      value: "24",                               ms: 11 },
  { oid: "1.3.6.1.2.1.2.2.1.5.1",      value: "10000000",                         ms: 8  },
  { oid: "1.3.6.1.2.1.2.2.1.2.2",      value: "eth0",                             ms: 10 },
  { oid: "1.3.6.1.2.1.2.2.1.3.2",      value: "6",                                ms: 9  },
  { oid: "1.3.6.1.2.1.2.2.1.5.2",      value: "1000000000",                       ms: 13 },
  { oid: "1.3.6.1.2.1.2.2.1.10.2",     value: "9823746",                          ms: 15 },
  { oid: "1.3.6.1.2.1.2.2.1.16.2",     value: "4523890",                          ms: 14 },
  { oid: "1.3.6.1.2.1.2.2.1.21.2",     value: "0",                                ms: 18 },
  // hostResources — SLOW (88–220 ms)
  { oid: "1.3.6.1.2.1.25.1.1.0",       value: "1234567890",                       ms: 95  },
  { oid: "1.3.6.1.2.1.25.1.2.0",       value: "2024-01-15,12:34:56.0",            ms: 110 },
  { oid: "1.3.6.1.2.1.25.1.5.0",       value: "3",                                ms: 88  },
  { oid: "1.3.6.1.2.1.25.1.6.0",       value: "8589934592",                       ms: 145 },
  { oid: "1.3.6.1.2.1.25.2.2.0",       value: "4096",                             ms: 120 },
  { oid: "1.3.6.1.2.1.25.2.3.1.1.1",   value: "1",                                ms: 180 },
  { oid: "1.3.6.1.2.1.25.2.3.1.2.1",   value: "hrStorageRam",                     ms: 200 },
  { oid: "1.3.6.1.2.1.25.2.3.1.3.1",   value: "Physical memory",                  ms: 195 },
  { oid: "1.3.6.1.2.1.25.2.3.1.4.1",   value: "4096",                             ms: 210 },
  { oid: "1.3.6.1.2.1.25.3.2.1.1.1",   value: "1",                                ms: 175 },
  { oid: "1.3.6.1.2.1.25.3.2.1.2.1",   value: "hrDeviceProcessor",                ms: 188 },
  { oid: "1.3.6.1.2.1.25.3.2.1.3.1",   value: "Intel Core i7-8700",               ms: 220 },
  { oid: "1.3.6.1.2.1.25.4.2.1.1.1",   value: "1",                                ms: 165 },
  { oid: "1.3.6.1.2.1.25.4.2.1.2.1",   value: "init",                             ms: 180 },
  { oid: "1.3.6.1.2.1.25.4.2.1.4.1",   value: "/sbin/init",                       ms: 175 },
  { oid: "1.3.6.1.2.1.25.4.2.1.1.2",   value: "2",                                ms: 190 },
  { oid: "1.3.6.1.2.1.25.4.2.1.2.2",   value: "kthreadd",                         ms: 155 },
  { oid: "1.3.6.1.2.1.25.5.1.1.1.1",   value: "1830",                             ms: 168 },
  // ifXTable — moderate (18–30 ms)
  { oid: "1.3.6.1.2.1.31.1.1.1.1.1",   value: "lo",                               ms: 18 },
  { oid: "1.3.6.1.2.1.31.1.1.1.1.2",   value: "eth0",                             ms: 20 },
  { oid: "1.3.6.1.2.1.31.1.1.1.6.1",   value: "0",                                ms: 22 },
  { oid: "1.3.6.1.2.1.31.1.1.1.6.2",   value: "98237460",                         ms: 25 },
  { oid: "1.3.6.1.2.1.31.1.1.1.10.2",  value: "45238901",                         ms: 28 },
  { oid: "1.3.6.1.2.1.31.1.1.1.15.2",  value: "1000",                             ms: 30 },
  { oid: "1.3.6.1.2.1.31.1.1.1.18.2",  value: "",                                 ms: 25 },
  // cisco-enterprise — VERY SLOW (320–600 ms)
  { oid: "1.3.6.1.4.1.9.2.1.1.0",               value: "12",           ms: 320 },
  { oid: "1.3.6.1.4.1.9.2.1.3.0",               value: "router-01",    ms: 410 },
  { oid: "1.3.6.1.4.1.9.2.1.8.0",               value: "74738474",     ms: 380 },
  { oid: "1.3.6.1.4.1.9.2.2.1.1.1",             value: "1",            ms: 450 },
  { oid: "1.3.6.1.4.1.9.2.2.1.1.2",             value: "2",            ms: 520 },
  { oid: "1.3.6.1.4.1.9.9.48.1.1.1.6.1",        value: "8589934592",   ms: 490 },
  { oid: "1.3.6.1.4.1.9.9.48.1.1.1.5.1",        value: "2147483648",   ms: 560 },
  { oid: "1.3.6.1.4.1.9.9.109.1.1.1.1.3.1",     value: "15",           ms: 580 },
  { oid: "1.3.6.1.4.1.9.9.109.1.1.1.1.8.1",     value: "82",           ms: 600 },
  { oid: "1.3.6.1.4.1.9.9.109.1.1.1.1.12.1",    value: "74",           ms: 545 },
];

const SUBTREES = [
  { prefix: "1.3.6.1.2.1.1.",  name: "system",           color: "#3b82f6" },
  { prefix: "1.3.6.1.2.1.2.",  name: "interfaces",       color: "#10b981" },
  { prefix: "1.3.6.1.2.1.25.", name: "hostResources",    color: "#f59e0b" },
  { prefix: "1.3.6.1.2.1.31.", name: "ifXTable",         color: "#8b5cf6" },
  { prefix: "1.3.6.1.4.1.9.",  name: "cisco-enterprise", color: "#ef4444" },
];

function subtreeOf(oid) {
  return SUBTREES.find(s => oid.startsWith(s.prefix)) || { name: "other", color: "#6b7280" };
}

function msColor(ms) {
  if (ms <= 10)  return "#22c55e";
  if (ms <= 30)  return "#84cc16";
  if (ms <= 100) return "#eab308";
  if (ms <= 300) return "#f97316";
  return "#ef4444";
}

const maxMs    = Math.max(...DATA.map(d => d.ms));
const totalMs  = DATA.reduce((a, b) => a + b.ms, 0);
const avgMs    = Math.round(totalMs / DATA.length);

// Build ordered groups preserving walk order
const groupMap = new Map();
DATA.forEach(d => {
  const sub = subtreeOf(d.oid);
  if (!groupMap.has(sub.name)) groupMap.set(sub.name, { ...sub, items: [] });
  groupMap.get(sub.name).items.push(d);
});

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  const app = document.getElementById('app');
  let html = `
    <div class="header">
      <h1>SNMP Walk &mdash; Waterfall Chart</h1>
      <div class="stats">
        <div class="stat"><span class="stat-value">${DATA.length}</span><span class="stat-label">OIDs</span></div>
        <div class="stat"><span class="stat-value">${totalMs} ms</span><span class="stat-label">Total walk time</span></div>
        <div class="stat"><span class="stat-value">${maxMs} ms</span><span class="stat-label">Slowest OID</span></div>
        <div class="stat"><span class="stat-value">${avgMs} ms</span><span class="stat-label">Average</span></div>
      </div>
    </div>
    <div class="legend">
      ${SUBTREES.map(s => `<div class="legend-item"><span class="legend-dot" style="background:${s.color}"></span>${s.name}</div>`).join('')}
      <div class="legend-item" style="margin-left:auto; gap:10px; font-size:10px;">
        <span style="color:#22c55e">■ &le;10ms</span>
        <span style="color:#84cc16">■ &le;30ms</span>
        <span style="color:#eab308">■ &le;100ms</span>
        <span style="color:#f97316">■ &le;300ms</span>
        <span style="color:#ef4444">■ &gt;300ms</span>
      </div>
    </div>
    <div class="scale-row">
      <div class="col-label" style="font-size:10px;color:#475569">SUBTREE</div>
      <div class="col-oid" style="font-size:10px;color:#475569">OID</div>
      <div class="col-bar">
        <div class="scale-ticks">
          <span>0</span><span>${Math.round(maxMs*0.25)}ms</span><span>${Math.round(maxMs*0.5)}ms</span><span>${Math.round(maxMs*0.75)}ms</span><span>${maxMs}ms</span>
        </div>
      </div>
      <div class="col-ms-h"></div>
    </div>`;

  for (const group of groupMap.values()) {
    const gTotal = group.items.reduce((a,b) => a+b.ms, 0);
    const gAvg   = Math.round(gTotal / group.items.length);
    html += `
      <div class="group-header">
        <span class="group-name" style="color:${group.color}">${group.name}</span>
        <div class="group-meta">
          <span>${group.items.length} OIDs</span>
          <span>total ${gTotal} ms</span>
          <span>avg ${gAvg} ms</span>
        </div>
      </div>`;
    for (const d of group.items) {
      const pct   = (d.ms / maxMs * 100).toFixed(2);
      const short = d.oid.length > 38 ? d.oid.slice(0, 35) + '...' : d.oid;
      html += `
        <div class="row"
          onmouseenter="tt(event,'${esc(d.oid)}','${esc(d.value)}',${d.ms})"
          onmouseleave="ht()">
          <div class="col-badge" style="color:${group.color}">${group.name.slice(0,14)}</div>
          <div class="col-oid-val">${esc(short)}</div>
          <div class="col-bar-cell">
            <div class="bar-fill" style="width:${pct}%;background:${group.color};opacity:0.85"></div>
          </div>
          <div class="col-ms" style="color:${msColor(d.ms)}">${d.ms}ms</div>
        </div>`;
    }
  }

  app.innerHTML = html;
}

function tt(e, oid, val, ms) {
  const el = document.getElementById('tooltip');
  document.getElementById('tt-oid').textContent = oid;
  document.getElementById('tt-val').textContent = 'Value: ' + (val || '(empty)');
  document.getElementById('tt-ms').textContent  = 'Response time: ' + ms + ' ms';
  el.style.display = 'block';
  el.style.left = (e.clientX + 14) + 'px';
  el.style.top  = (e.clientY - 8)  + 'px';
}
function ht() { document.getElementById('tooltip').style.display = 'none'; }

render();
</script>
</body>
</html>
