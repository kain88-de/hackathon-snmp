<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SNMP Walk — Flame Graph</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111827; color: #e2e8f0; font-size: 13px; }

    .header { padding: 20px 24px 14px; border-bottom: 1px solid #1f2937; }
    h1 { font-size: 17px; font-weight: 700; color: #f9fafb; margin-bottom: 10px; }
    .subtitle { font-size: 11px; color: #6b7280; margin-bottom: 12px; }
    .stats { display: flex; gap: 24px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; }
    .stat-value { font-size: 20px; font-weight: 700; color: #f9fafb; line-height: 1; }
    .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }

    .chart-area { padding: 24px; }
    .row-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; font-weight: 600; }

    .flame-row {
      position: relative;
      height: 36px;
      margin-bottom: 3px;
      border-radius: 4px;
      overflow: hidden;
      background: #1f2937;
    }

    .flame-block {
      position: absolute;
      top: 0;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: filter 0.1s;
      border-right: 1px solid #111827;
    }
    .flame-block:hover { filter: brightness(1.25); z-index: 10; }
    .flame-block span {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 4px;
      pointer-events: none;
    }

    .oid-row { height: 24px; margin-bottom: 3px; }
    .oid-row .flame-block { height: 100%; }
    .oid-row .flame-block span { font-size: 9px; }

    .gap-row { height: 14px; }

    .details-box {
      margin: 0 24px 16px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 12px 16px;
      min-height: 56px;
      font-size: 12px;
      font-family: monospace;
    }
    .db-hint   { color: #6b7280; font-family: sans-serif; font-size: 11px; }
    .db-label  { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: #6b7280; margin-bottom: 4px; font-family: sans-serif; }
    .db-oid    { font-weight: 700; color: #f9fafb; margin-bottom: 4px; word-break: break-all; }
    .db-val    { color: #9ca3af; margin-bottom: 4px; }
    .db-ms     { font-size: 15px; font-weight: 700; }
    .db-pct    { font-size: 11px; color: #6b7280; margin-left: 8px; }
    .db-row    { display: flex; gap: 20px; flex-wrap: wrap; }
    .db-field  { display: flex; flex-direction: column; gap: 2px; }

    .legend {
      margin: 0 24px 20px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .legend-label { font-size: 10px; color: #6b7280; margin-right: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #9ca3af;
      background: #1f2937;
      padding: 3px 8px;
      border-radius: 12px;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    .axis {
      position: relative;
      height: 18px;
      margin: 4px 0 18px;
    }
    .axis-tick {
      position: absolute;
      font-size: 9px;
      color: #4b5563;
      transform: translateX(-50%);
    }
    .axis-line {
      position: absolute;
      top: 0;
      width: 1px;
      height: 6px;
      background: #374151;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

<div class="header">
  <h1>SNMP Walk &mdash; Flame Graph</h1>
  <p class="subtitle">Width proportional to time spent. Click any block for details.</p>
  <div class="stats" id="stats"></div>
</div>

<div class="chart-area" id="chart"></div>

<div class="details-box" id="details">
  <span class="db-hint">Click a block to inspect an OID or subtree</span>
</div>

<div class="legend" id="legend">
  <span class="legend-label">Subtrees</span>
</div>

<script>
const DATA = [
  // system MIB — fast (1–3 ms)
  { oid: "1.3.6.1.2.1.1.1.0",          value: "Linux 5.15.0 #1 SMP x86_64",      ms: 3  },
  { oid: "1.3.6.1.2.1.1.2.0",          value: "1.3.6.1.4.1.8072.3.2.10",         ms: 2  },
  { oid: "1.3.6.1.2.1.1.3.0",          value: "1234567890",                       ms: 1  },
  { oid: "1.3.6.1.2.1.1.4.0",          value: "admin@example.com",                ms: 2  },
  { oid: "1.3.6.1.2.1.1.5.0",          value: "router-01.example.com",            ms: 1  },
  { oid: "1.3.6.1.2.1.1.6.0",          value: "Server Room A",                   ms: 2  },
  { oid: "1.3.6.1.2.1.1.7.0",          value: "72",                               ms: 3  },
  // interfaces — moderate (7–18 ms)
  { oid: "1.3.6.1.2.1.2.1.0",          value: "8",                                ms: 8  },
  { oid: "1.3.6.1.2.1.2.2.1.1.1",      value: "1",                                ms: 9  },
  { oid: "1.3.6.1.2.1.2.2.1.2.1",      value: "lo",                               ms: 7  },
  { oid: "1.3.6.1.2.1.2.2.1.3.1",      value: "24",                               ms: 11 },
  { oid: "1.3.6.1.2.1.2.2.1.5.1",      value: "10000000",                         ms: 8  },
  { oid: "1.3.6.1.2.1.2.2.1.2.2",      value: "eth0",                             ms: 10 },
  { oid: "1.3.6.1.2.1.2.2.1.3.2",      value: "6",                                ms: 9  },
  { oid: "1.3.6.1.2.1.2.2.1.5.2",      value: "1000000000",                       ms: 13 },
  { oid: "1.3.6.1.2.1.2.2.1.10.2",     value: "9823746",                          ms: 15 },
  { oid: "1.3.6.1.2.1.2.2.1.16.2",     value: "4523890",                          ms: 14 },
  { oid: "1.3.6.1.2.1.2.2.1.21.2",     value: "0",                                ms: 18 },
  // hostResources — SLOW (88–220 ms)
  { oid: "1.3.6.1.2.1.25.1.1.0",       value: "1234567890",                       ms: 95  },
  { oid: "1.3.6.1.2.1.25.1.2.0",       value: "2024-01-15,12:34:56.0",            ms: 110 },
  { oid: "1.3.6.1.2.1.25.1.5.0",       value: "3",                                ms: 88  },
  { oid: "1.3.6.1.2.1.25.1.6.0",       value: "8589934592",                       ms: 145 },
  { oid: "1.3.6.1.2.1.25.2.2.0",       value: "4096",                             ms: 120 },
  { oid: "1.3.6.1.2.1.25.2.3.1.1.1",   value: "1",                                ms: 180 },
  { oid: "1.3.6.1.2.1.25.2.3.1.2.1",   value: "hrStorageRam",                     ms: 200 },
  { oid: "1.3.6.1.2.1.25.2.3.1.3.1",   value: "Physical memory",                  ms: 195 },
  { oid: "1.3.6.1.2.1.25.2.3.1.4.1",   value: "4096",                             ms: 210 },
  { oid: "1.3.6.1.2.1.25.3.2.1.1.1",   value: "1",                                ms: 175 },
  { oid: "1.3.6.1.2.1.25.3.2.1.2.1",   value: "hrDeviceProcessor",                ms: 188 },
  { oid: "1.3.6.1.2.1.25.3.2.1.3.1",   value: "Intel Core i7-8700",               ms: 220 },
  { oid: "1.3.6.1.2.1.25.4.2.1.1.1",   value: "1",                                ms: 165 },
  { oid: "1.3.6.1.2.1.25.4.2.1.2.1",   value: "init",                             ms: 180 },
  { oid: "1.3.6.1.2.1.25.4.2.1.4.1",   value: "/sbin/init",                       ms: 175 },
  { oid: "1.3.6.1.2.1.25.4.2.1.1.2",   value: "2",                                ms: 190 },
  { oid: "1.3.6.1.2.1.25.4.2.1.2.2",   value: "kthreadd",                         ms: 155 },
  { oid: "1.3.6.1.2.1.25.5.1.1.1.1",   value: "1830",                             ms: 168 },
  // ifXTable — moderate (18–30 ms)
  { oid: "1.3.6.1.2.1.31.1.1.1.1.1",   value: "lo",       ms: 18 },
  { oid: "1.3.6.1.2.1.31.1.1.1.1.2",   value: "eth0",     ms: 20 },
  { oid: "1.3.6.1.2.1.31.1.1.1.6.1",   value: "0",        ms: 22 },
  { oid: "1.3.6.1.2.1.31.1.1.1.6.2",   value: "98237460", ms: 25 },
  { oid: "1.3.6.1.2.1.31.1.1.1.10.2",  value: "45238901", ms: 28 },
  { oid: "1.3.6.1.2.1.31.1.1.1.15.2",  value: "1000",     ms: 30 },
  { oid: "1.3.6.1.2.1.31.1.1.1.18.2",  value: "",         ms: 25 },
  // cisco-enterprise — VERY SLOW (320–600 ms)
  { oid: "1.3.6.1.4.1.9.2.1.1.0",            value: "12",         ms: 320 },
  { oid: "1.3.6.1.4.1.9.2.1.3.0",            value: "router-01",  ms: 410 },
  { oid: "1.3.6.1.4.1.9.2.1.8.0",            value: "74738474",   ms: 380 },
  { oid: "1.3.6.1.4.1.9.2.2.1.1.1",          value: "1",          ms: 450 },
  { oid: "1.3.6.1.4.1.9.2.2.1.1.2",          value: "2",          ms: 520 },
  { oid: "1.3.6.1.4.1.9.9.48.1.1.1.6.1",     value: "8589934592", ms: 490 },
  { oid: "1.3.6.1.4.1.9.9.48.1.1.1.5.1",     value: "2147483648", ms: 560 },
  { oid: "1.3.6.1.4.1.9.9.109.1.1.1.1.3.1",  value: "15",         ms: 580 },
  { oid: "1.3.6.1.4.1.9.9.109.1.1.1.1.8.1",  value: "82",         ms: 600 },
  { oid: "1.3.6.1.4.1.9.9.109.1.1.1.1.12.1", value: "74",         ms: 545 },
];

const SUBTREES = [
  { prefix: "1.3.6.1.2.1.1.",  name: "system",           color: "#3b82f6" },
  { prefix: "1.3.6.1.2.1.2.",  name: "interfaces",       color: "#10b981" },
  { prefix: "1.3.6.1.2.1.25.", name: "hostResources",    color: "#f59e0b" },
  { prefix: "1.3.6.1.2.1.31.", name: "ifXTable",         color: "#8b5cf6" },
  { prefix: "1.3.6.1.4.1.9.",  name: "cisco-enterprise", color: "#ef4444" },
];

function subtreeOf(oid) {
  return SUBTREES.find(s => oid.startsWith(s.prefix)) || { name: "other", color: "#6b7280" };
}

// Darken a hex color slightly for OID blocks vs subtree headers
function darken(hex, amt) {
  let c = parseInt(hex.slice(1), 16);
  let r = Math.max(0, (c >> 16) - amt);
  let g = Math.max(0, ((c >> 8) & 0xff) - amt);
  let b = Math.max(0, (c & 0xff) - amt);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

const totalMs = DATA.reduce((a,b) => a+b.ms, 0);
const maxMs   = Math.max(...DATA.map(d => d.ms));
const avgMs   = Math.round(totalMs / DATA.length);

// Stats
document.getElementById('stats').innerHTML = `
  <div class="stat"><span class="stat-value">${DATA.length}</span><span class="stat-label">OIDs</span></div>
  <div class="stat"><span class="stat-value">${totalMs} ms</span><span class="stat-label">Total walk</span></div>
  <div class="stat"><span class="stat-value">${maxMs} ms</span><span class="stat-label">Slowest OID</span></div>
  <div class="stat"><span class="stat-value">${avgMs} ms</span><span class="stat-label">Average</span></div>
`;

// Build subtree groups in walk order
const groups = new Map();
DATA.forEach(d => {
  const sub = subtreeOf(d.oid);
  if (!groups.has(sub.name)) groups.set(sub.name, { ...sub, items: [], total: 0 });
  const g = groups.get(sub.name);
  g.items.push(d);
  g.total += d.ms;
});

const chart = document.getElementById('chart');
const details = document.getElementById('details');

function setDetails(html) { details.innerHTML = html; }

function pct(ms) { return (ms / totalMs * 100).toFixed(4) + '%'; }

// Legend
const legend = document.getElementById('legend');
for (const g of groups.values()) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${g.color}"></span>${g.name} <span style="color:#6b7280;font-size:10px">${g.total}ms (${(g.total/totalMs*100).toFixed(1)}%)</span>`;
  legend.appendChild(item);
}

// ── Row 1: Total bar ──────────────────────────────────────────
const lbl1 = document.createElement('div');
lbl1.className = 'row-label';
lbl1.textContent = 'Total walk';
chart.appendChild(lbl1);

const totalRow = document.createElement('div');
totalRow.className = 'flame-row';
totalRow.innerHTML = `
  <div class="flame-block" style="left:0;width:100%;background:#374151;cursor:default;">
    <span>Total walk &mdash; ${totalMs} ms</span>
  </div>`;
chart.appendChild(totalRow);

// ── Axis ─────────────────────────────────────────────────────
const axis = document.createElement('div');
axis.className = 'axis';
[0, 0.25, 0.5, 0.75, 1].forEach(f => {
  const tick = document.createElement('div');
  tick.className = 'axis-tick';
  tick.style.left = (f * 100) + '%';
  const line = document.createElement('div');
  line.className = 'axis-line';
  line.style.left = (f * 100) + '%';
  tick.textContent = Math.round(f * totalMs) + 'ms';
  axis.appendChild(line);
  axis.appendChild(tick);
});
chart.appendChild(axis);

// ── Row 2: Subtree blocks ─────────────────────────────────────
const lbl2 = document.createElement('div');
lbl2.className = 'row-label';
lbl2.textContent = 'Subtrees';
chart.appendChild(lbl2);

const subtreeRow = document.createElement('div');
subtreeRow.className = 'flame-row';
chart.appendChild(subtreeRow);

let cumLeft = 0;
for (const g of groups.values()) {
  const leftPct  = (cumLeft  / totalMs * 100).toFixed(4);
  const widthPct = (g.total  / totalMs * 100).toFixed(4);
  cumLeft += g.total;

  const block = document.createElement('div');
  block.className = 'flame-block';
  block.style.cssText = `left:${leftPct}%;width:${widthPct}%;background:${g.color};`;
  block.innerHTML = `<span>${g.name} &mdash; ${g.total}ms (${(g.total/totalMs*100).toFixed(1)}%)</span>`;
  block.addEventListener('click', () => {
    const gAvg = Math.round(g.total / g.items.length);
    const gMax = Math.max(...g.items.map(d=>d.ms));
    setDetails(`
      <div class="db-label">Subtree</div>
      <div class="db-oid" style="color:${g.color}">${g.name}</div>
      <div class="db-row">
        <div class="db-field"><span class="db-label">OIDs</span><strong>${g.items.length}</strong></div>
        <div class="db-field"><span class="db-label">Total</span><span class="db-ms" style="color:${g.color}">${g.total} ms</span></div>
        <div class="db-field"><span class="db-label">% of walk</span><strong>${(g.total/totalMs*100).toFixed(1)}%</strong></div>
        <div class="db-field"><span class="db-label">Avg</span><strong>${gAvg} ms</strong></div>
        <div class="db-field"><span class="db-label">Max</span><strong>${gMax} ms</strong></div>
      </div>`);
  });
  subtreeRow.appendChild(block);
}

// ── Row 3: Individual OIDs ────────────────────────────────────
const gap = document.createElement('div');
gap.className = 'gap-row';
chart.appendChild(gap);

const lbl3 = document.createElement('div');
lbl3.className = 'row-label';
lbl3.textContent = 'Individual OIDs (width = response time)';
chart.appendChild(lbl3);

const oidRow = document.createElement('div');
oidRow.className = 'flame-row oid-row';
chart.appendChild(oidRow);

let oidCumLeft = 0;
DATA.forEach(d => {
  const sub = subtreeOf(d.oid);
  const leftPct  = (oidCumLeft / totalMs * 100).toFixed(4);
  const widthPct = (d.ms       / totalMs * 100).toFixed(4);
  oidCumLeft += d.ms;

  const block = document.createElement('div');
  block.className = 'flame-block';
  block.style.cssText = `left:${leftPct}%;width:${widthPct}%;background:${darken(sub.color, 20)};`;
  block.innerHTML = `<span>${d.ms}ms</span>`;
  block.title = d.oid;
  block.addEventListener('click', () => {
    const g = groups.get(sub.name);
    setDetails(`
      <div class="db-label">OID</div>
      <div class="db-oid">${d.oid}</div>
      <div class="db-val">Value: ${d.value || '(empty)'}</div>
      <div class="db-row">
        <div class="db-field"><span class="db-label">Response time</span><span class="db-ms" style="color:${sub.color}">${d.ms} ms</span></div>
        <div class="db-field"><span class="db-label">% of walk</span><strong>${(d.ms/totalMs*100).toFixed(2)}%</strong></div>
        <div class="db-field"><span class="db-label">Subtree</span><strong style="color:${sub.color}">${sub.name}</strong></div>
        <div class="db-field"><span class="db-label">Subtree avg</span><strong>${Math.round(g.total/g.items.length)} ms</strong></div>
      </div>`);
  });
  oidRow.appendChild(block);
});

// ── Row 4: Sorted top-10 slowest ─────────────────────────────
const gap2 = document.createElement('div');
gap2.className = 'gap-row';
chart.appendChild(gap2);

const lbl4 = document.createElement('div');
lbl4.className = 'row-label';
lbl4.textContent = 'Top 10 slowest OIDs (sorted)';
chart.appendChild(lbl4);

const sorted = [...DATA].sort((a,b) => b.ms - a.ms).slice(0, 10);
sorted.forEach(d => {
  const sub = subtreeOf(d.oid);
  const widthPct = (d.ms / maxMs * 100).toFixed(2);
  const row = document.createElement('div');
  row.className = 'flame-row oid-row';
  row.style.marginBottom = '2px';
  row.innerHTML = `
    <div class="flame-block" style="left:0;width:${widthPct}%;background:${sub.color};">
      <span>${d.oid.length > 40 ? '…'+d.oid.slice(-37) : d.oid} &mdash; ${d.ms} ms</span>
    </div>`;
  row.querySelector('.flame-block').addEventListener('click', () => {
    const g = groups.get(sub.name);
    setDetails(`
      <div class="db-label">OID</div>
      <div class="db-oid">${d.oid}</div>
      <div class="db-val">Value: ${d.value || '(empty)'}</div>
      <div class="db-row">
        <div class="db-field"><span class="db-label">Response time</span><span class="db-ms" style="color:${sub.color}">${d.ms} ms</span></div>
        <div class="db-field"><span class="db-label">% of walk</span><strong>${(d.ms/totalMs*100).toFixed(2)}%</strong></div>
        <div class="db-field"><span class="db-label">Subtree</span><strong style="color:${sub.color}">${sub.name}</strong></div>
      </div>`);
  });
  chart.appendChild(row);
});
</script>
</body>
</html>
