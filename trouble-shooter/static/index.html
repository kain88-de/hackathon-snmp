<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNMP Troubleshooter</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <h1>SNMP Troubleshooter</h1>

  <form id="check-form">
    <label>
      Host / IP
      <input type="text" id="host" placeholder="192.168.1.1" required />
    </label>
    <label>
      Community string
      <input type="text" id="community" value="public" />
    </label>
    <label>
      Port
      <input type="number" id="port" value="161" min="1" max="65535" />
    </label>
    <button type="submit">Check</button>
  </form>

  <section id="results" hidden></section>

  <section id="walk-section" hidden>
    <h2>OID Walk</h2>
    <div class="view-toggle">
      <button class="view-btn active" data-view="tree">Tree</button>
      <button class="view-btn" data-view="table">Table</button>
      <button class="view-btn" data-view="raw">Raw</button>
    </div>

    <div id="view-tree" class="view-pane"></div>
    <div id="view-table" class="view-pane" hidden></div>
    <div id="view-raw" class="view-pane" hidden></div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
